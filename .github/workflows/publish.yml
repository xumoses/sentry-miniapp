name: CD - Publish to NPM

on:
  push:
    tags:
      - 'v*-beta.*' # 私有 fork 永远只发布 beta，例如 v1.13.1-beta.0

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 同一 ref 的发布串行，避免重复推 tag 并发触发两次发布
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # 这使得工作流能够通过 OIDC 从 GitHub 获取凭证

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run Lint
        run: yarn run lint

      - name: Type Check
        run: yarn run typecheck

      - name: Run Tests
        run: yarn run test

      - name: Verify Beta Release Policy
        run: yarn run verify:beta-release

      - name: Build Project
        run: yarn run build

      - name: Publish to NPM
        run: npm publish --access public --provenance --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
